services:
  - type: web
    name: forum
    runtime: go
    buildCommand: "go build -o forum main.go"
    startCommand: "./forum"
    envVars:
      - key: APP_PORT
        value: ":{{ .Port }}"
      - key: DB_HOST
        fromDatabase:
          name: forum-mysql
          property: host
      - key: DB_USER
        fromDatabase:
          name: forum-mysql
          property: user
      - key: DB_PASS
        fromDatabase:
          name: forum-mysql
          property: password
      - key: DB_NAME
        fromDatabase:
          name: forum-mysql
          property: database

databases:
  - name: forum-mysql
    databaseName: forumdb
    user: forum_user
    region: oregon

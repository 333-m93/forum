<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Le Dojo</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script>!function(){var t=localStorage.getItem('forumTheme');t=t||window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.classList.add('theme-'+t)}()</script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <img class="logo-image" src="/static/logo.png" alt="Le Dojo">
                <span class="logo-text">Le Dojo</span>
            </div>
            <nav class="top-nav">
                <a href="/">Accueil</a>
                <button id="theme-toggle" class="btn ghost" type="button">Mode sombre</button>
            </nav>
        </div>
    </header>

    <main class="page-container">
        <section class="card auth-card">
            <div class="auth-hero">
                <h1>Connexion</h1>
                <p>Connexion rapide pour reprendre ta place au Dojo.</p>
            </div>
            {{ if .Message }}
            <div class="alert">{{ .Message }}</div>
            {{ end }}
            <form method="POST" action="/login" class="auth-form">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" required>
                <label>Mot de passe</label>
                <input type="password" name="password" required>
                <button type="submit">Se connecter</button>
            </form>
            <p class="footer-link">Pas encore inscrit ? <a href="/register">Créer un compte</a></p>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">© Le Dojo • Rejoins le temple du combat</div>
    </footer>
    <script src="/static/theme.js"></script>
</body>
</html>

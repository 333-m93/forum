<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ .Name }} - Forum Sports de Combat</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .hero { text-align:center; padding: 40px 10px; }
        .hero h2 { color: #ffd700; margin: 0 0 8px; }
        .categories { display:grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-top:24px; }
        .cat { background: rgba(255,255,255,0.03); padding:14px; border-radius:10px; text-align:center; border:1px solid rgba(255,255,255,0.03);} 
        .cat a { color:#ffb380; text-decoration:none; font-weight:700; }
    </style>
</head>
<body>
    <main class="page-container">
        <section class="card">
            <div class="hero">
                <h1>{{ .Name }}</h1>
                <h2>Le forum francophone des sports de combat</h2>
                <p>Discussions techniques, entraînement, résultats et équipement.</p>
                <p style="margin-top:12px;"><a href="/register" class="btn">Créer un compte</a> &nbsp; <a href="/login" class="btn">Se connecter</a></p>
            </div>

            <h3 style="color:#e8e8e8; margin-top:20px;">Catégories</h3>
            <div class="categories">
                {{ range .Categories }}
                <div class="cat"><a href="#">{{ . }}</a></div>
                {{ end }}
            </div>
        </section>
    </main>
</body>
</html>

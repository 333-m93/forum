<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ .Name }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <img class="logo-image" src="/static/logo.png" alt="Le Dojo">
                <span class="logo-text">{{ .Name }}</span>
            </div>
            <nav class="top-nav">
                <a href="/">Accueil</a>
                <a href="/register">S'inscrire</a>
                <a href="/login">Se connecter</a>
            </nav>
        </div>
    </header>

    <main class="home-root">
        <section class="hero card">
            <div class="hero-content">
                <span class="hero-label">Dojo</span>
                <h1 class="site-title">{{ .Name }}</h1>
                <div class="hero-cta">
                    <a class="btn primary" href="/register">Entrer au Dojo</a>
                    <a class="btn ghost" href="/login">Déjà membre</a>
                </div>
            </div>
        </section>

        <section class="container card">
            <h2 class="section-title">Catégories populaires</h2>
            <div class="categories-grid">
                {{ range .Categories }}
                <article class="category-card">
                    <h3 class="cat-name">{{ . }}</h3>
                    <p class="cat-desc">Discussions et ressources sur {{ . }}.</p>
                    <a class="cat-link" href="#">Voir les sujets →</a>
                </article>
                {{ end }}
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">© {{ .Name }} • Le temple où chaque coup forge le caractère</div>
    </footer>
</body>
</html>

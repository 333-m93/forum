<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ .Name }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>

<header class="site-header">
    <div class="header-inner">

        <div class="logo">
            <img class="logo-image" src="/static/logo.png" alt="Le Dojo">
            <span class="logo-text">{{ .Name }}</span>
        </div>

        <nav class="top-nav">
            <a href="/">Accueil</a>
            <a href="/register">S'inscrire</a>
            <a href="/login">Se connecter</a>
            <a href="/logout" id="logout-link">Déconnexion</a>

            <button id="theme-toggle" class="btn ghost" type="button">
                Mode sombre
            </button>
        </nav>

    </div>
</header>

<main class="home-root">

    <!-- HERO -->
    <section class="hero card">
        <div class="hero-content">
            <h1 class="site-title">{{ .Name }}</h1>

            <div class="hero-cta">
                <a class="btn primary" href="/register">Entrer</a>
                <a class="btn ghost" href="/login">Connexion</a>
            </div>
        </div>
    </section>

    <!-- CATEGORIES -->
    <section class="container card">
        <h2 class="section-title">Catégories</h2>

        <div class="categories-grid">

            {{ range .Categories }}
            <article class="category-card">

                <h3>{{ .Name }}</h3>

                <p>Discussions sur {{ .Name }}</p>

                <a href="#"
                   class="cat-link"
                   data-cat-id="{{ .ID }}"
                   data-cat-name="{{ .Name }}">
                   Ouvrir le chat →
                </a>

            </article>
            {{ end }}

        </div>
    </section>

    <!-- CHAT -->
    <aside id="floating-chat" class="floating-chat" aria-hidden="true">
        <div class="chat-placeholder">
            <h3>Choisis une catégorie</h3>
        </div>
    </aside>

</main>

<footer class="site-footer">
    <div>© {{ .Name }}</div>
</footer>

<script src="/static/theme.js"></script>
<script src="/static/chat.js"></script>

</body>
</html>
